name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  mcp:
    name: MCP build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: mcp/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: smoke test CLI
        run: |
          node dist/index.js status || true
          node dist/index.js privacy || true

  backend:
    name: Backend tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.11', '3.12']
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock
      - name: AST parse all modules
        run: python -c "import ast, glob; [ast.parse(open(f).read()) for f in glob.glob('app/*.py')]; print('all modules parse clean')"
      - name: run pytest
        run: pytest -q --no-header
        env:
          DATABASE_URL: 'sqlite:///:memory:'
